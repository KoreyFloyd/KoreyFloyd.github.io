<!DOCTYPE html>
<html>
    <head>
        <title>Workout App</title>
    </head>
    <body>
        <h1>Workout Log</h1>
<div>
        <input id="nameInput" placeholder="Enter Name">
        <input id="distanceInput" placeholder="Enter distance">
        <select name="Units" id="units">
            <option value="miles">Miles</option>
            <option value="meters">Meters</option>
        </select>
        <button id="addBtn">Add Workout</button>
        <br>
       <input type="radio" name="distanceFilter" id="filter_all" value ="all" checked>
       <label for="filter_all">Show All</label>
       <input type="radio" name="distanceFilter" id="filter_over3" vlaue = "3_miles">
       <label for="filter_over3">3 Miles or more</label>
       

        <ul id ="output"></ul>
        <ul id ="totalInfo"> </ul>
        <script src="app.js"></script>
</div>
    </body>
</html>
