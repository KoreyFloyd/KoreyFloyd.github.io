<!DOCTYPE html>
<html>
    <head>
        <title>Workout App</title>
    </head>
    <body>
        <h1>Workout Log</h1>
<div>
        <input id="nameInput" placeholder="Enter Name">
        <input id="distanceInput" placeholder="Enter distance">
        <select name="Units" id="units">
            <option value="miles">Miles</option>
            <option value="meters">Meters</option>
        </select>
        <button id="addBtn">Add Workout</button>
        <br>
       <input type="radio" name="distance" id="All">
       <label for="All">Show All</label>
       <input type="radio" name="distance" id="3_miles">
       <label for="3_miles">More than 3 Miles</label>
       

        <ul id ="output"></ul>
        <ul id ="totalInfo"> </ul>
        <script src="app.js"></script>
</div>
    </body>
</html>
